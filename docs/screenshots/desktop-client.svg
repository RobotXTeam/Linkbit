<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linkbit desktop client screenshot</title>
  <desc id="desc">The Linkbit desktop client showing controller settings, device enrollment, and TCP relay forwarding.</desc>
  <rect width="1280" height="820" fill="#EEF3F5"/>
  <rect x="46" y="42" width="1188" height="736" rx="16" fill="#FFFFFF" stroke="#CCD7DD"/>
  <rect x="46" y="42" width="1188" height="88" rx="16" fill="#FFFFFF"/>
  <path d="M46 130H1234" stroke="#D9E2E7"/>
  <rect x="76" y="72" width="38" height="38" rx="10" fill="#0F766E"/>
  <path d="M87 99L96 82L103 91L113 76L104 101L97 92L87 99Z" fill="#B8FFF3"/>
  <text x="130" y="92" font-family="Inter, Segoe UI, Arial" font-size="28" font-weight="700" fill="#172026">Linkbit Desktop Client</text>
  <text x="130" y="116" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#667985">Connected through cloud relay</text>
  <rect x="1010" y="72" width="178" height="40" rx="8" fill="#E8EDEF"/>
  <text x="1041" y="98" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#172026">Open Console</text>
  <rect x="76" y="162" width="430" height="330" rx="10" fill="#FFFFFF" stroke="#D8E1E6"/>
  <text x="104" y="202" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="700" fill="#172026">Agent Connection</text>
  <text x="104" y="244" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#52606B">Controller URL</text>
  <rect x="104" y="258" width="370" height="42" rx="7" fill="#F7FAFB" stroke="#C9D3D9"/>
  <text x="120" y="285" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#172026">https://controller.example.com</text>
  <text x="104" y="330" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#52606B">Enrollment Token</text>
  <rect x="104" y="344" width="370" height="42" rx="7" fill="#F7FAFB" stroke="#C9D3D9"/>
  <text x="120" y="371" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#8A98A3">lb_xxxxxxxxxxxxxxxxxxxx</text>
  <text x="104" y="416" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#52606B">Device Name</text>
  <rect x="104" y="430" width="370" height="42" rx="7" fill="#F7FAFB" stroke="#C9D3D9"/>
  <text x="120" y="457" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#172026">workstation</text>
  <rect x="104" y="520" width="140" height="42" rx="8" fill="#0F766E"/>
  <text x="134" y="546" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#FFFFFF">Start Agent</text>
  <rect x="258" y="520" width="100" height="42" rx="8" fill="#E8EDEF"/>
  <text x="292" y="546" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#172026">Stop</text>
  <rect x="76" y="520" width="430" height="204" rx="10" fill="#FFFFFF" stroke="#D8E1E6"/>
  <text x="104" y="560" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="700" fill="#172026">SSH / RDP Forwarding</text>
  <text x="104" y="600" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#52606B">Local Listen</text>
  <rect x="104" y="614" width="170" height="42" rx="7" fill="#F7FAFB" stroke="#C9D3D9"/>
  <text x="120" y="641" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#172026">127.0.0.1:10022</text>
  <text x="304" y="600" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#52606B">Remote Target</text>
  <rect x="304" y="614" width="170" height="42" rx="7" fill="#F7FAFB" stroke="#C9D3D9"/>
  <text x="320" y="641" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#172026">friendlywrt:22</text>
  <rect x="104" y="674" width="178" height="42" rx="8" fill="#0F766E"/>
  <text x="125" y="700" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#FFFFFF">Start Forward</text>
  <rect x="536" y="162" width="652" height="562" rx="10" fill="#101820"/>
  <text x="566" y="206" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#D5F5E8">&gt; Agent started</text>
  <text x="566" y="238" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#D5F5E8">{ "msg": "loaded device state", "virtualIp": "10.88.235.251" }</text>
  <text x="566" y="270" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#D5F5E8">{ "msg": "tcp relay target enabled", "poll": "long" }</text>
  <text x="566" y="322" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#74D7FF">&gt; Forward started on 127.0.0.1:10022</text>
  <text x="566" y="354" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#D5F5E8">ssh -p 10022 root@127.0.0.1</text>
</svg>
