version: 2

project_name: linkbit

before:
  hooks:
    - sh -c "cd web && npm ci && npm run build"
    - go mod tidy

builds:
  - id: controller
    main: ./cmd/linkbit-controller
    binary: linkbit-controller
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/linkbit/linkbit/internal/version.Version={{.Version}}
      - -X github.com/linkbit/linkbit/internal/version.Commit={{.Commit}}
      - -X github.com/linkbit/linkbit/internal/version.Date={{.Date}}
  - id: relay
    main: ./cmd/linkbit-relay
    binary: linkbit-relay
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/linkbit/linkbit/internal/version.Version={{.Version}}
      - -X github.com/linkbit/linkbit/internal/version.Commit={{.Commit}}
      - -X github.com/linkbit/linkbit/internal/version.Date={{.Date}}
  - id: agent
    main: ./cmd/linkbit-agent
    binary: linkbit-agent
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/linkbit/linkbit/internal/version.Version={{.Version}}
      - -X github.com/linkbit/linkbit/internal/version.Commit={{.Commit}}
      - -X github.com/linkbit/linkbit/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: linux-packages
    package_name: linkbit
    vendor: Linkbit
    homepage: https://github.com/RobotXTeam/Linkbit
    maintainer: Linkbit Maintainers
    description: Self-hosted secure low-latency communication platform.
    license: Apache-2.0
    formats:
      - deb
      - rpm

checksum:
  name_template: checksums.txt
